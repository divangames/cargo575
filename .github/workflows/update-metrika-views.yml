name: Update Metrika Views

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Fetch views from Yandex Metrika
        env:
          METRIKA_COUNTER_ID: ${{ secrets.METRIKA_COUNTER_ID }}
          METRIKA_OAUTH_TOKEN: ${{ secrets.METRIKA_OAUTH_TOKEN }}
          METRIKA_PAGE_URL: ${{ secrets.METRIKA_PAGE_URL }}
          METRIKA_PAGE_URLS: ${{ secrets.METRIKA_PAGE_URLS }}
          METRIKA_PERIOD_START: 7daysAgo
          METRIKA_PERIOD_END: today
          METRIKA_OUTPUT_FILE: data/metrika-views.json
        run: node scripts/update-metrika-views.mjs

      - name: Commit updated JSON
        run: |
          git add data/metrika-views.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "chore: update metrika views data"
          git push
